services:
  # PostgreSQL Database
  - type: pserv
    name: gestar-trombofilia-db
    plan: starter
    ipAllowList: []
    databaseName: gestar_trombofilia_db
    user: gestar_user
    postgresMajorVersion: 15
    preDeployCommand: pnpm db:push
    region: ohio

  # Web Service (Node.js Backend + Expo Web Frontend)
  - type: web
    name: gestar-trombofilia-app
    plan: starter
    runtime: node
    region: ohio
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: gestar-trombofilia-db
          property: connectionString
      - key: EXPO_PUBLIC_API_BASE_URL
        value: https://gestar-trombofilia-app.onrender.com
      - key: VITE_APP_ID
        sync: false
      - key: VITE_OAUTH_PORTAL_URL
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: OWNER_NAME
        sync: false
    connect:
      - name: gestar-trombofilia-db
